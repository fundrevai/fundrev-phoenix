services:
  phoenix:
    build:
      dockerfile: ./Dockerfile
      context: .
    depends_on:
      - db
    ports:
      - 6006:6006
      - 4317:4317
    environment:
      - PHOENIX_SQL_DATABASE_URL=postgresql://fundrev-phoenix-postgressql.postgres.database.azure.com:5432/postgres?user=fundrevpostgresadmin&password=!KnSEvsoeuU&sslmode=require
  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=fundrevpostgresadmin
      - POSTGRES_PASSWORD=!KnSEvsoeuU
      - POSTGRES_DB=postgres
    ports:
      - 5432
    volumes:
      - database_data:/var/lib/postgresql/data
volumes:
  database_data:
    driver: local
